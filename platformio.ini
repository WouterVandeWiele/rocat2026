; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = ESP32_4MB_1APP.csv
board_build.filesystem = spiffs

lib_deps = 
    https://github.com/sparkfun/SparkFun_SX1509_Arduino_Library.git
    https://github.com/sparkfun/SparkFun_LIS3DH_Arduino_Library.git
    ; https://github.com/FastLED/FastLED.git@^3.10.3
    https://github.com/adafruit/Adafruit_NeoPixel.git@^1.15.1
    https://github.com/yoprogramo/QRcodeDisplay.git
    https://github.com/tzapu/WiFiManager.git
    ; spirik/GEM
    ; https://github.com/olikraus/u8g2.git
    https://github.com/WouterVandeWiele/GEM.git#manual_update
    https://github.com/Spirik/KeyDetector.git@^1.2.0
    mathieucarbou/ESPAsyncWebServer @ 3.1.1
    bblanchon/ArduinoJson @ ^7.4.2
    https://github.com/leethomason/tinyxml2.git
    ;https://github.com/SpellFoundry/PCF8523.git
    https://github.com/adafruit/RTClib.git
    https://github.com/adafruit/Adafruit_BusIO.git
    https://github.com/mmarkin/GeoIP.git
    spacehuhn/SimpleCLI@^1.1.4
    https://github.com/pschatzmann/arduino-audio-tools.git#v1.2.4
    https://github.com/pschatzmann/arduino-libhelix.git
    https://github.com/sparkfun/SparkFun_TMP102_Arduino_Library.git#v1.1.2

build_flags =
    -D GEM_DISABLE_U8G2
    -D USE_INLINE_VARS=1
    -D QRCODEVERSION=4
    -Wno-unused-variable
    -Wno-unused-but-set-variable
    -Wno-unused-function
    -Wno-format-extra-args
    -DESP32_ARDUINO_NO_RGB_BUILTIN=1
    -std=gnu++17

    ; ── RAM optimizations ──────────────────────────────────────────
    ; TLS buffer reduction — 4 KB instead of 16 KB per direction (header-level, works)
    -DMBEDTLS_SSL_IN_CONTENT_LEN=4096
    -DMBEDTLS_SSL_OUT_CONTENT_LEN=4096
    ; Arduino loop stack — default 8K, don't reduce (Serial.begin needs it)

    ; -D PLATFORM_ROBOX_HW=1
    ; ; -D CORE_DEBUG_LEVEL=5
    ; -D USE_INLINE_VARS=1
    ; ; Disable U8g2 support

extra_scripts =
    pre:patches/apply_patches.py
    ; pre:upload_fs_before_flash.py

monitor_echo = yes
; monitor_dtr = 0
; monitor_rts = 0
monitor_filters =
    send_on_enter
    esp32_exception_decoder

